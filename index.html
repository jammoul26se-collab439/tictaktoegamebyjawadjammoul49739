<!Doctype html>
<html> 
<head>
<title>Tic Tac toe Game</title>
<link rel="preconnect" href = "https://fonts.googleapis.com">
<link rel="preconnect" href = "https://fonts.gstatic.com" crossorigin>
<link href = "https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<link rel="stylesheet" href="monstyle.css">
<meta name="viewport" content = "width=device-width, inital-scale =1.0">
</head>
<body>
<h1>Smart Tik Tac Toe Game</h1>
<p id="scoreText">
   <span id="playerLabel">Player</span>:
   <span id="playerScore">0</span> |
   <span id="aiLabel">AI</span>:
   <span id="aiScore">0</span>
</p>
<br>
<div class = "mainContainer">
    <div class = "menuButtons">
        <button id = "startBtn">Start</button>
        <button onclick= "restartGame()">Restart</button>
        <button id= "optionsBtn">Options</button>
        <button id = "aboutBtn" onclick="openAboutUs()">About Us</button>
        <button id = "exitBtn" onclick="exitGame()">Exit</button>
    </div>
    <div class = "gameArea">
        <div class = "TicTacToe1">
            <div class = "TicTacToe2" id = "Sq1"></div>
            <div class = "TicTacToe2" id = "Sq2"></div>
            <div class = "TicTacToe2" id = "Sq3"></div>
            <div class = "TicTacToe2" id = "Sq4"></div>
            <div class = "TicTacToe2" id = "Sq5"></div>
            <div class = "TicTacToe2" id = "Sq6"></div>
            <div class = "TicTacToe2" id = "Sq7"></div>
            <div class = "TicTacToe2" id = "Sq8"></div>
            <div class = "TicTacToe2" id = "Sq9"></div>
        </div>
    </div>
</div>
<div id = "result" style = "text-align: center;  font-size: 20px;  margin-top: 10px;">
</div>

<div id="timer">00:00</div>
<div id="footerInfo">
<p id="authorText">By Jawad Jammoul</p>
<p id="versionText">version 2.0</p>
<p id="copyrightText">&copy; 2026 All Rights Reserved</p>
</div>
<div id = "optionsModal">
    <div id="optionsBox">
        <div id = "optionsContent">
            <button id="muteBtn" onclick ="toggleVolume()">Mute Volume</button>
            <div id = "languageContainer">
                <button id = "languageBtn">Language</button>
                <div id = "languageMenu">
                    <div class="languageOption" data-lang="en">English</div>
                    <div class="languageOption" data-lang="ar">اللغة العربية</div>
                    <div class="languageOption" data-lang="es">Español</div>
                    <div class="languageOption" data-lang="fr">Français</div>
                    <div class="languageOption" data-lang="ru">Русский</div>
                </div>
            </div>
            <div id = "difficultyContainer">
                <button id = "difficultyBtn">Difficulty</button>
                <div id="difficultyMenu">
                    <div class = "difficultyOption" id ="easyOption" data-level="easy">Easy</div>
                    <div class = "difficultyOption" id="normalOption" data-level="normal">Normal</div>
                    <div class = "difficultyOption" id="hardOption" data-level="hard">Hard</div>
                    <div class = "difficultyOption" id="twoPlayersOption" data-level="2players">2 Players</div>
                </div>
            </div>
        </div>
        <button id="closeOptionsBtn">close</button>
    </div>
</div>
<script src = "script.js"></script>
</body>
</html>
